run:
  task: flickr30k_instruct
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6

  # for cococapeval
  num_beams: 5
  max_len: 10
  min_len: 1
  log_freq: 250

  weight_decay: 0.05
  max_epoch: 10
  batch_size_train: 2
  batch_size_eval: 1
  num_workers: 4
  warmup_steps: 5000

  seed: 42
  output_dir: "/output/InstructBLIP/finetune"

  amp: True
  resume_ckpt_path: null

  evaluate: False 
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True