model:
  arch: blip2_vicuna_instruct
  model_type: vicuna7b # 
  load_pretrained: True #pretrain from scratch
  freeze_vit: True


datasets:
  scienceqa:
    train_samples_portion: 500
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
      eval:
        name: "blip_image_eval"
        image_size: 224
    text_processor:
      train:
        name: "instruct_blip_question"
      eval:
        name: "instruct_blip_question"

run:
  task: scienceqa
  # optimizer
  lr_sched: "linear_decay_lr"
  init_lr: 5e-4
  min_lr: 0


  # log_freq: 250

  weight_decay: 0.05
  max_epoch: 10
  batch_size_train: 1
  batch_size_eval: 1
  num_workers: 4
  # warmup_steps: 5000
  accum_grad_iters: 16

  seed: 42
  output_dir: "/output/results/scienceqa/scienceqa_23"

  amp: True
  resume_ckpt_path: null

  evaluate: False 
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True