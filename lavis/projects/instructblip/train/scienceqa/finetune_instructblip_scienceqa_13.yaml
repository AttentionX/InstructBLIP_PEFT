model:
  arch: blip2_vicuna_instruct_qformer_lora # blip2_vicuna_instruct #
  model_type: vicuna7b # vicuna7b #
  load_pretrained: True #pretrain from scratch
  freeze_vit: True
  lora_r: 1
  lora_alpha: 8
  lora_dropout: 0.00
  self_attention_qv_lora: True
  selfoutput_lora: False
  bertoutput_lora: False
  qformer_crossattention_lora_q: False
  qformer_crossattention_lora_k: False
  qformer_crossattention_lora_v: False
  qformer_crossattention_lora_o: False

datasets:
  scienceqa:
    train_samples_portion: all
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
      eval:
        name: "blip_image_eval"
        image_size: 224
    text_processor:
      train:
        name: "instruct_blip_question"
      eval:
        name: "instruct_blip_question"
    # build_info:
    #   images:
    #     storage: "/root/InstructBLIP_PEFT/lavis/scienceqa"
# vg_caption: # name of the dataset builder
#   vis_processor:
#       train:
#         name: "blip_image_train"
#         image_size: 224
#   text_processor:
#       train:
#         name: "blip_caption"
#     build_info:
#         images:
#             storage: '//export/share/datasets/vision/visual-genome/image/'

run:
  task: scienceqa
  # optimizer
  lr_sched: "linear_decay_lr"
  init_lr: 5e-4
  min_lr: 0

  weight_decay: 0.05
  max_epoch: 10
  batch_size_train: 1
  accum_grad_iters: 16
  batch_size_eval: 1
  num_workers: 4

  # inference-specific
  inference_method: "rank"

  seed: 42
  output_dir: "/output/results/scienceqa/scienceqa_13"

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
