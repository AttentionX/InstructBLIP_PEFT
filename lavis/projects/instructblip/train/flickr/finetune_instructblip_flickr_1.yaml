model:
  arch: blip2_vicuna_instruct_qformer_lora # blip2_vicuna_instruct #
  model_type: vicuna7b # vicuna7b #
  load_pretrained: True #pretrain from scratch
  freeze_vit: True
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  selfattention_lora: False
  selfoutput_lora: False
  bertoutput_lora: False
  qformer_crossattention_lora_q: True
  qformer_crossattention_lora_k: False
  qformer_crossattention_lora_v: False


datasets:
  flickr30k_instruct:
    train_samples_portion: all
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
      eval:
        name: "blip2_image_train"
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"
      eval:
        name: "blip_caption"
    #  build_info:
    #     images:
    #       storage: 'lavis/flickr30k'          
  # vg_caption: # name of the dataset builder
  #   vis_processor:
  #       train:
  #         name: "blip_image_train"
  #         image_size: 224
  #   text_processor:
  #       train:
  #         name: "blip_caption"
#     build_info:
#         images:
#             storage: '//export/share/datasets/vision/visual-genome/image/'

run:
  task: flickr30k_instruct
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6

  # for cococapeval
  num_beams: 1
  max_len: 256
  min_len: 1
  log_freq: 250

  weight_decay: 0.05
  max_epoch: 10
  batch_size_train: 2
  batch_size_eval: 1
  num_workers: 4
  warmup_steps: 5000

  seed: 42
  output_dir: "/output/results/flickr/flickr_1"

  amp: True
  resume_ckpt_path: null

  # evaluate: True
  evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True