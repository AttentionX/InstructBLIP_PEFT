model:
  arch: blip2_vicuna_instruct_qformer_lora # blip2_t5_instruct_qformer_lora
  model_type: vicuna7b #
  load_pretrained: True #pretrain from scratch
  freeze_vit: True
  lora_r: 8
  lora_alpha: 8
  lora_dropout: 0
  self_attention_qv_lora: False 
  self_attention_output_lora: False 
  ffn_lora: False 
  qformer_crossattention_lora_q: True
  qformer_crossattention_lora_k: False 
  qformer_crossattention_lora_v: False 
  qformer_crossattention_lora_o: False 


datasets:
  flickr30k_instruct:
    train_samples_portion: all
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
      eval:
        name: "blip2_image_train"
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"
      eval:
        name: "blip_caption"
    #  build_info:
    #     images:
    #       storage: 'lavis/flickr30k'          
  # vg_caption: # name of the dataset builder
  #   vis_processor:
  #       train:
  #         name: "blip_image_train"
  #         image_size: 224
  #   text_processor:
  #       train:
  #         name: "blip_caption"
#     build_info:
#         images:
#             storage: '//export/share/datasets/vision/visual-genome/image/'

run:
  task: flickr30k_instruct
  # optimizer
  lr_sched: "linear_decay_lr"
  init_lr: 5e-4
  min_lr: 0
  warmup_lr: 5e-6
  warmup_steps: 0

  # for cococapeval
  num_beams: 1
  max_len: 256
  min_len: 1
  log_freq: 250

  weight_decay: 0.05
  max_epoch: 10
  batch_size_train: 1
  
  accum_grad_iters: 16
  batch_size_eval: 1
  num_workers: 4

  seed: 42
  output_dir: "/output/results/flickr/flickr_1"

  amp: True
  resume_ckpt_path: null

  evaluate: True
  # evaluate: False
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True