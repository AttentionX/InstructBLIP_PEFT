    data_type: images # [images|videos|features]

    build_info:
      # Be careful not to append minus sign (-) before split to avoid itemizing
      annotations:
        train:
          url: /root/InstructBLIP_PEFT/lavis/scienceqa/scienceqa_train.json
          storage: /root/InstructBLIP_PEFT/lavis/scienceqa/scienceqa_train.json
        val:
          url: /root/InstructBLIP_PEFT/lavis/scienceqa/scienceqa_val.json
          storage: /root/InstructBLIP_PEFT/lavis/scienceqa/scienceqa_val.json
        test:
          url: /root/InstructBLIP_PEFT/lavis/scienceqa/scienceqa_test.json
          storage: /root/InstructBLIP_PEFT/lavis/scienceqa/scienceqa_test.json
      images:
        train:
          storage: scienceqa/images/
        val:
          storage: scienceqa/images/
        test:
          storage: scienceqa/images/
